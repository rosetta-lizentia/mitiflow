# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/
#
# Run locally: cargo deny check
# CI: runs via EmbarkStudios/cargo-deny-action

[graph]
all-features = true

# ──────────────────────────────────────────────
# Advisories — check for known vulnerabilities
# ──────────────────────────────────────────────
[advisories]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"

# ──────────────────────────────────────────────
# Licenses — enforce allowed license set
# ──────────────────────────────────────────────
[licenses]
unlicensed = "deny"
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "OpenSSL",
    "CC0-1.0",
    "BSL-1.0",
]
copyleft = "deny"

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ──────────────────────────────────────────────
# Bans — prevent problematic dependencies
# ──────────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

# ──────────────────────────────────────────────
# Sources — only allow crates.io
# ──────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
