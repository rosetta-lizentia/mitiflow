# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/
#
# Run locally: cargo deny check
# CI: runs via EmbarkStudios/cargo-deny-action

[graph]
all-features = true

# ──────────────────────────────────────────────
# Advisories — check for known vulnerabilities
# ──────────────────────────────────────────────
[advisories]
unmaintained = "workspace"
ignore = [
    # rsa: Marvin Attack timing sidechannel — transitive dep via zenoh/quinn;
    # no direct RSA usage in mitiflow, awaiting upstream fix.
    "RUSTSEC-2023-0071",
    # rustls-webpki: CRL distribution point matching — low impact for our use case
    # (no CRL-based revocation). Transitive via zenoh.
    "RUSTSEC-2026-0049",
]

# ──────────────────────────────────────────────
# Licenses — enforce allowed license set
# ──────────────────────────────────────────────
[licenses]
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "OpenSSL",
    "CC0-1.0",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ──────────────────────────────────────────────
# Bans — prevent problematic dependencies
# ──────────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

# ──────────────────────────────────────────────
# Sources — only allow crates.io
# ──────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
