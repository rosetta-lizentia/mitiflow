# Mitiflow container-compose — orchestrator + storage
#
# Usage:
#   podman compose up -d          # Start all services
#   podman compose up -d storage  # Start storage only
#   podman compose logs -f        # Follow logs
#   podman compose down -v        # Stop and remove volumes
#
# Build images first:
#   podman build --build-arg PACKAGE=mitiflow-storage -t mitiflow-storage .
#   podman build --build-arg PACKAGE=mitiflow-orchestrator -t mitiflow-orchestrator .
#   # Or with UI:
#   podman build --build-arg PACKAGE=mitiflow-orchestrator --build-arg BUILD_UI=true -t mitiflow-orchestrator .

services:
  orchestrator:
    image: ghcr.io/rosetta-lizentia/mitiflow/orchestrator:main
    container_name: mitiflow-orchestrator
    build:
      context: .
      dockerfile: Containerfile
      args:
        PACKAGE: mitiflow-orchestrator
        BUILD_UI: true
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - MITIFLOW_KEY_PREFIX=mitiflow
      - MITIFLOW_DATA_DIR=/data
      - MITIFLOW_HTTP_BIND=0.0.0.0:8080
      - RUST_LOG=mitiflow_orchestrator=info
    volumes:
      - orchestrator_data:/data
    restart: unless-stopped

  storage:
    image: ghcr.io/rosetta-lizentia/mitiflow/storage:main
    container_name: mitiflow-storage
    build:
      context: .
      dockerfile: Containerfile
      args:
        PACKAGE: mitiflow-storage
    environment:
      - MITIFLOW_DATA_DIR=/data
      - MITIFLOW_KEY_PREFIX=mitiflow
      - MITIFLOW_NUM_PARTITIONS=16
      - RUST_LOG=mitiflow_storage=info
    volumes:
      - storage_data:/data
    restart: unless-stopped

volumes:
  orchestrator_data:
  storage_data:
