# Mitiflow container-compose — orchestrator + storage + Zenoh router
#
# Usage:
#   podman compose up -d          # Start all services
#   podman compose up -d storage  # Start storage only (with dependencies)
#   podman compose logs -f        # Follow logs
#   podman compose down -v        # Stop and remove volumes
#
# Build images first:
#   podman build --build-arg PACKAGE=mitiflow-storage -t mitiflow-storage .
#   podman build --build-arg PACKAGE=mitiflow-orchestrator -t mitiflow-orchestrator .
#   # Or with UI:
#   podman build --build-arg PACKAGE=mitiflow-orchestrator --build-arg BUILD_UI=true -t mitiflow-orchestrator .

services:
  zenoh-router:
    image: docker.io/eclipse/zenoh:latest
    container_name: mitiflow-zenoh-router
    ports:
      - "127.0.0.1:7447:7447"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x /zenohd || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  orchestrator:
    image: ghcr.io/pawissanutt/mitiflow/orchestrator:dev
    container_name: mitiflow-orchestrator
    build:
      context: .
      dockerfile: Containerfile
      args:
        PACKAGE: mitiflow-orchestrator
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - MITIFLOW_KEY_PREFIX=mitiflow
      - MITIFLOW_DATA_DIR=/data
      - MITIFLOW_HTTP_BIND=0.0.0.0:8080
      - RUST_LOG=mitiflow_orchestrator=info
      - ZENOH_CONNECT=tcp/zenoh-router:7447
    volumes:
      - orchestrator_data:/data
    depends_on:
      zenoh-router:
        condition: service_healthy
    restart: unless-stopped

  storage:
    image: ghcr.io/pawissanutt/mitiflow/storage:dev
    container_name: mitiflow-storage
    build:
      context: .
      dockerfile: Containerfile
      args:
        PACKAGE: mitiflow-storage
    environment:
      - MITIFLOW_DATA_DIR=/data
      - MITIFLOW_KEY_PREFIX=mitiflow
      - MITIFLOW_NUM_PARTITIONS=16
      - RUST_LOG=mitiflow_storage=info
      - ZENOH_CONNECT=tcp/zenoh-router:7447
    volumes:
      - storage_data:/data
    depends_on:
      zenoh-router:
        condition: service_healthy
    restart: unless-stopped

volumes:
  orchestrator_data:
  storage_data:
